<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小猩看板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #f0f4f8;
            --bg-secondary: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --accent-cyan: #06b6d4;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-green: #10b981;
            --accent-orange: #f59e0b;
            --accent-red: #ef4444;
            --accent-pink: #ec4899;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --radius: 16px;
            --radius-sm: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 50%, #f1f5f9 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            font-size: 14px;
        }

        /* Subtle grid pattern */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px 24px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 32px;
            background: var(--bg-card);
            border-radius: var(--radius);
            margin-bottom: 32px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 8px 20px rgba(6, 182, 212, 0.3);
            position: relative;
            overflow: hidden;
        }

        .logo::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.3));
        }

        .header-title {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .header-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(16, 185, 129, 0.05));
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 24px;
            font-size: 13px;
            font-weight: 600;
            color: var(--accent-green);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-green);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.9); }
        }

        .header-time {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            font-family: 'Outfit', monospace;
            padding: 10px 16px;
            background: var(--bg-secondary);
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 24px;
        }

        .card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .col-span-3 { grid-column: span 3; }
        .col-span-4 { grid-column: span 4; }
        .col-span-6 { grid-column: span 6; }
        .col-span-8 { grid-column: span 8; }
        .col-span-12 { grid-column: span 12; }

        /* Card Header */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .card-title {
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title-icon {
            font-size: 18px;
        }

        /* Stats Grid */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 12px;
        }

        .stat-item {
            background: linear-gradient(145deg, var(--bg-secondary), #ffffff);
            border-radius: var(--radius-sm);
            padding: 16px 8px;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .stat-item:hover {
            border-color: var(--accent-cyan);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .stat-icon {
            font-size: 22px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* List Items */
        .list-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
        }

        .list-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .list-item:hover {
            background: #ffffff;
            border-color: var(--border-color);
            transform: translateX(4px);
            box-shadow: var(--shadow-sm);
        }

        .item-rank {
            width: 28px;
            height: 28px;
            background: var(--accent-purple);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }

        .item-rank.top1 {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #000;
        }

        .item-rank.top2 {
            background: linear-gradient(135deg, #94a3b8, #64748b);
            color: #fff;
        }

        .item-rank.top3 {
            background: linear-gradient(135deg, #b45309, #92400e);
            color: #fff;
        }

        .item-content {
            flex: 1;
            min-width: 0;
        }

        .item-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .item-desc {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-meta {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }

        .item-tag {
            font-size: 11px;
            padding: 3px 8px;
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-blue);
            border-radius: 6px;
            font-weight: 600;
        }

        /* AI News Items */
        .ai-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            background: var(--bg-secondary);
            border-radius: 10px;
            font-size: 13px;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .ai-item:hover {
            background: #ffffff;
            border-color: var(--border-color);
            transform: translateX(4px);
        }

        .ai-icon {
            font-size: 16px;
            flex-shrink: 0;
        }

        .ai-text {
            flex: 1;
            color: var(--text-primary);
            font-weight: 500;
        }

        /* View Full Link */
        .view-full-link {
            display: block;
            margin-top: 16px;
            padding: 12px;
            background: linear-gradient(135deg, var(--bg-secondary), #ffffff);
            color: var(--accent-blue);
            border-radius: 10px;
            text-align: center;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }

        .view-full-link:hover {
            border-color: var(--accent-blue);
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.05), #ffffff);
            transform: translateY(-2px);
        }

        /* Cron Items */
        .cron-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-radius: 10px;
            font-size: 14px;
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }

        .cron-item:hover {
            background: #ffffff;
            border-color: var(--border-color);
            transform: translateX(4px);
        }

        .cron-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cron-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .cron-status.active {
            background: var(--accent-green);
            box-shadow: 0 0 8px var(--accent-green);
        }

        .cron-status.paused {
            background: var(--text-muted);
        }

        .cron-name {
            font-weight: 500;
            color: var(--text-primary);
        }

        .cron-time {
            color: var(--accent-blue);
            font-family: 'Outfit', sans-serif;
            font-size: 12px;
            font-weight: 600;
            background: rgba(59, 130, 246, 0.1);
            padding: 4px 10px;
            border-radius: 6px;
        }

        /* Priority Items */
        .priority-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px;
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            border-left: 3px solid var(--accent-blue);
            transition: all 0.2s ease;
        }

        .priority-item:hover {
            background: #ffffff;
            transform: translateX(4px);
            box-shadow: var(--shadow-sm);
        }

        .priority-item.high {
            border-left-color: var(--accent-red);
            background: linear-gradient(145deg, var(--bg-secondary), rgba(239, 68, 68, 0.03));
        }

        .priority-item.medium {
            border-left-color: var(--accent-orange);
            background: linear-gradient(145deg, var(--bg-secondary), rgba(245, 158, 11, 0.03));
        }

        .priority-item.low {
            border-left-color: var(--accent-green);
            background: linear-gradient(145deg, var(--bg-secondary), rgba(16, 185, 129, 0.03));
        }

        .priority-icon {
            font-size: 22px;
        }

        .priority-content {
            flex: 1;
        }

        .priority-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .priority-desc {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Project Items */
        .project-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            border-left: 3px solid var(--accent-blue);
            transition: all 0.2s ease;
        }

        .project-item:hover {
            background: #ffffff;
            transform: translateX(4px);
            box-shadow: var(--shadow-sm);
        }

        .project-item.high {
            border-left-color: var(--accent-red);
        }

        .project-item.medium {
            border-left-color: var(--accent-orange);
        }

        .project-item.low {
            border-left-color: var(--accent-green);
        }

        .project-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .project-meta {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Pagination */
        .pagination {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pagination-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--accent-blue);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .pagination-btn:hover {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        .page-indicator {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            padding: 6px 12px;
            background: var(--bg-secondary);
            border-radius: 8px;
            min-width: 40px;
            text-align: center;
        }

        /* Quick Links */
        .quick-links-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .quick-link-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            text-decoration: none;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .quick-link-item:hover {
            background: #ffffff;
            border-color: var(--border-color);
            transform: translateY(-4px);
            box-shadow: var(--shadow);
        }

        .quick-link-icon {
            font-size: 32px;
            margin-bottom: 8px;
            transition: transform 0.3s ease;
        }

        .quick-link-item:hover .quick-link-icon {
            transform: scale(1.1);
        }

        .quick-link-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .quick-link-item:hover .quick-link-label {
            color: var(--text-primary);
        }

        /* Terminal */
        .terminal {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: var(--radius-sm);
            padding: 20px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.8;
            overflow-x: auto;
        }

        .terminal-line {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .terminal-prompt {
            color: var(--accent-green);
            font-weight: 600;
        }

        .terminal-command {
            color: #e2e8f0;
        }

        .terminal-output {
            color: var(--text-muted);
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .col-span-3 { grid-column: span 6; }
            .col-span-4 { grid-column: span 6; }
            .col-span-6 { grid-column: span 12; }
            .col-span-8 { grid-column: span 12; }
            .stat-grid { grid-template-columns: repeat(5, 1fr); }
        }

        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            .col-span-3, .col-span-4, .col-span-6, .col-span-8 { grid-column: span 1; }
            .header { flex-direction: column; gap: 16px; padding: 20px; }
            .stat-grid { grid-template-columns: repeat(2, 1fr); }
            .quick-links-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <div class="logo">🦧</div>
                <div>
                    <div class="header-title">小猩看板</div>
                    <div class="header-subtitle">系统监控 · 项目追踪 · 任务管理</div>
                </div>
            </div>
            <div class="header-right">
                <div class="status-pill">
                    <span class="status-dot"></span>
                    <span>SYSTEM ONLINE</span>
                </div>
                <div class="header-time">
                    <span id="currentTime">--:--:--</span> UTC
                </div>
            </div>
        </div>

        <!-- Grid -->
        <div class="grid">
            <!-- Server Stats -->
            <div class="card col-span-12">
                <div class="card-header">
                    <div class="card-title">
                        <span class="card-title-icon">🖥️</span>
                        性能监控
                    </div>
                </div>
                <div class="stat-grid" id="serverStats"></div>
            </div>

            <!-- GitHub Trending -->
            <div class="card col-span-3">
                <div class="card-header">
                    <div class="card-title">
                        <span class="card-title-icon">🐙</span>
                        GitHub Starred Top5
                    </div>
                </div>
                <div class="list-container" id="githubTrending"></div>
            </div>

            <!-- Agent Projects -->
            <div class="card col-span-3">
                <div class="card-header">
                    <div class="card-title">
                        <span class="card-title-icon">🤖</span>
                        Agent Projects Top5
                    </div>
                </div>
                <div class="list-container" id="agentProjects"></div>
            </div>

            <!-- AI News -->
            <div class="card col-span-6">
                <div class="card-header">
                    <div class="card-title">
                        <span class="card-title-icon">📰</span>
                        AI Rss Summary
                    </div>
                </div>
                <div class="list-container" id="aiNews"></div>
                <a href="https://feishu.cn/docx/OIeIdCCD7odCV8xDu45cMkIDnPd" target="_blank" class="view-full-link">
                    查看完整摘要 →
                </a>
            </div>

            <!-- Cron Jobs -->
            <div class="card col-span-4">
                <div class="card-header">
                    <div class="card-title">
                        <span class="card-title-icon">⚡</span>
                        System Cron
                    </div>
                    <div class="pagination">
                        <button class="pagination-btn" onclick="prevCronPage()">←</button>
                        <span class="page-indicator" id="cronPageIndicator">1/3</span>
                        <button class="pagination-btn" onclick="nextCronPage()">→</button>
                    </div>
                </div>
                <div class="list-container" id="cronJobs"></div>
            </div>

            <!-- Project Schedule -->
            <div class="card col-span-4">
                <div class="card-header">
                    <div class="card-title">
                        <span class="card-title-icon">📌</span>
                        Project Schedule
                    </div>
                </div>
                <div class="list-container" id="projectSchedule"></div>
            </div>

            <!-- Project Progress -->
            <div class="card col-span-4">
                <div class="card-header">
                    <div class="card-title">
                        <span class="card-title-icon">📊</span>
                        Project Progress Top5
                    </div>
                </div>
                <div class="list-container" id="projectProgress"></div>
            </div>

            <!-- Terminal -->
            <div class="card col-span-4">
                <div class="card-header">
                    <div class="card-title">
                        <span class="card-title-icon">💻</span>
                        System Terminal
                    </div>
                </div>
                <div class="terminal">
                    <div class="terminal-line">
                        <span class="terminal-prompt">➜</span>
                        <span class="terminal-command">openclaw status</span>
                    </div>
                    <div class="terminal-line">
                        <span class="terminal-output">  MiniMax-M2.5 · 78 sessions</span>
                    </div>
                    <div class="terminal-line">
                        <span class="terminal-prompt">➜</span>
                        <span class="terminal-command">date</span>
                    </div>
                    <div class="terminal-line">
                        <span class="terminal-output" id="terminalDate">  --</span>
                    </div>
                </div>
            </div>

            <!-- Quick Links -->
            <div class="card col-span-8">
                <div class="card-header">
                    <div class="card-title">
                        <span class="card-title-icon">🔗</span>
                        Quick Links
                    </div>
                </div>
                <div class="quick-links-grid" id="quickLinks"></div>
            </div>
        </div>
    </div>

    <script>
        // Data stores (loaded from JSON files)
        let serverStatsData = { stats: [] };
        let githubTrendingData = { projects: [] };
        let agentProjectsData = { projects: [] };
        let aiNewsData = { items: [] };
        let cronJobsData = { totalPages: 1, jobs: [] };
        let projectScheduleData = { items: [] };
        let projectProgressData = { projects: [] };
        let quickLinksData = { links: [] };

        // Load all data from JSON files
        async function loadAllData() {
            try {
                const [serverStats, githubTrending, agentProjects, aiNews, cronJobs, projectSchedule, projectProgress, quickLinks] = await Promise.all([
                    fetch('data/server-stats.json').then(r => r.json()),
                    fetch('data/github-trending.json').then(r => r.json()),
                    fetch('data/agent-projects.json').then(r => r.json()),
                    fetch('data/ai-news.json').then(r => r.json()),
                    fetch('data/cron-jobs.json').then(r => r.json()),
                    fetch('data/task-schedule.json').then(r => r.json()),
                    fetch('data/project-progress.json').then(r => r.json()),
                    fetch('data/quick-links.json').then(r => r.json())
                ]);

                serverStatsData = serverStats;
                githubTrendingData = githubTrending;
                agentProjectsData = agentProjects;
                aiNewsData = aiNews;
                cronJobsData = cronJobs;
                projectScheduleData = projectSchedule;
                projectProgressData = projectProgress;
                quickLinksData = quickLinks;

                // Render all components after data is loaded
                renderAll();
            } catch (error) {
                console.error('Error loading data:', error);
                document.body.innerHTML = '<div style="text-align:center;padding:50px;"><h2>加载数据失败</h2><p>请确保已通过 HTTP 服务器访问此页面</p><p style="color:#64748b;margin-top:10px;">错误: ' + error.message + '</p></div>';
            }
        }

        // Render functions
        function renderServerStats() {
            const container = document.getElementById('serverStats');
            container.innerHTML = serverStatsData.stats.map(stat => `
                <div class="stat-item">
                    <div class="stat-icon">${stat.icon}</div>
                    <div class="stat-value">${stat.value}</div>
                    <div class="stat-label">${stat.label}</div>
                </div>
            `).join('');
        }

        function renderGithubTrending() {
            const container = document.getElementById('githubTrending');
            const repos = githubTrendingData.repos || [];
            container.innerHTML = repos.map((p, i) => `
                <div class="list-item">
                    <div class="item-rank">${i+1}</div>
                    <div class="item-content">
                        <div class="item-title">${p.account}/${p.name}</div>
                        <div class="item-desc">${p.description_cn || p.description || '无描述'}</div>
                        <div class="item-meta">
                            <span class="item-tag">⭐ ${p.stars}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderAgentProjects() {
            const container = document.getElementById('agentProjects');
            const projects = agentProjectsData.projects || [];
            container.innerHTML = projects.slice(0, 10).map((p, i) => `
                <div class="list-item">
                    <div class="item-rank">${i+1}</div>
                    <div class="item-content">
                        <div class="item-title">${p.name}</div>
                        <div class="item-desc">${p.description_cn || p.description || '无描述'}</div>
                        <div class="item-meta">
                            <span class="item-tag">${p.keyword}</span>
                            <span class="item-tag">⭐ ${p.stars}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderAINews() {
            const container = document.getElementById('aiNews');
            const items = aiNewsData.items || [];
            container.innerHTML = items.slice(0, 10).map((item, i) => `
                <div class="ai-item">
                    <span class="ai-icon">📰</span>
                    <span class="ai-text">${i+1}. ${item.title}</span>
                </div>
            `).join('');
        }

        // Cron pagination
        let cronCurrentPage = 1;

        function renderCronJobs() {
            const container = document.getElementById('cronJobs');
            const jobs = cronJobsData.jobs.filter(j => j.page === cronCurrentPage);
            container.innerHTML = jobs.map(job => `
                <div class="cron-item">
                    <div class="cron-left">
                        <span class="cron-status ${job.status}"></span>
                        <span class="cron-name">${job.name}</span>
                    </div>
                    <span class="cron-time">${job.time}</span>
                </div>
            `).join('');
            document.getElementById('cronPageIndicator').textContent = `${cronCurrentPage}/${cronJobsData.totalPages}`;
        }

        function prevCronPage() {
            if (cronCurrentPage > 1) {
                cronCurrentPage--;
                renderCronJobs();
            }
        }

        function nextCronPage() {
            if (cronCurrentPage < cronJobsData.totalPages) {
                cronCurrentPage++;
                renderCronJobs();
            }
        }

        function renderProjectSchedule() {
            const container = document.getElementById('projectSchedule');
            container.innerHTML = projectScheduleData.items.map(item => `
                <div class="priority-item ${item.priority}">
                    <div class="priority-icon">${item.icon}</div>
                    <div class="priority-content">
                        <div class="priority-title">${item.title}</div>
                        <div class="priority-desc">${item.description}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderProjectProgress() {
            const container = document.getElementById('projectProgress');
            container.innerHTML = projectProgressData.projects.map(p => `
                <div class="project-item ${p.status}">
                    <div class="project-name">${p.name}</div>
                    <div class="project-meta">${p.meta}</div>
                </div>
            `).join('');
        }

        function renderQuickLinks() {
            const container = document.getElementById('quickLinks');
            container.innerHTML = quickLinksData.links.map(link => `
                <a href="${link.url}" target="_blank" class="quick-link-item">
                    <div class="quick-link-icon">${link.icon}</div>
                    <div class="quick-link-label">${link.label}</div>
                </a>
            `).join('');
        }

        // Update time
        function updateTime() {
            const now = new Date();
            const utc = now.toUTCString().slice(17, 25);
            document.getElementById('currentTime').textContent = utc;
            document.getElementById('terminalDate').textContent = '  ' + now.toISOString().slice(0, 19).replace('T', ' ');
        }

        // Render all components
        function renderAll() {
            renderServerStats();
            renderGithubTrending();
            renderAgentProjects();
            renderAINews();
            renderCronJobs();
            renderProjectSchedule();
            renderProjectProgress();
            renderQuickLinks();
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadAllData();
            updateTime();
            setInterval(updateTime, 1000);
        });
    </script>
</body>
</html>
